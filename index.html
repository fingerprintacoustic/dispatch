<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10151c;
    --steel:#1c2733;
    --steel-2:#26333f;
    --paper:#eef1f3;
    --paper-2:#ffffff;
    --line:#d8dee3;
    --amber:#e08a1f;
    --amber-dark:#b96e12;
    --green:#2f7d5c;
    --red:#c04a3d;
    --blue:#3a6ea5;
    --muted:#6b7680;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.45;}
  h1,h2,h3,.display{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.01em;text-transform:uppercase;}
  mono, .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:10px 16px;font-weight:600;font-size:14px;transition:transform .08s ease, opacity .15s ease;}
  button:active{transform:scale(0.97);}
  button:disabled{opacity:.45;cursor:not-allowed;}
  input,select,textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper-2);width:100%;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--amber);outline-offset:1px;border-color:var(--amber);}
  label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px;}
  .field{margin-bottom:14px;}
  .btn-primary{background:var(--amber);color:#1a1006;}
  .btn-primary:hover{background:var(--amber-dark);}
  .btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink);}
  .btn-ghost:hover{border-color:var(--ink);}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-sm{padding:6px 12px;font-size:12.5px;}
  .container{max-width:1080px;margin:0 auto;padding:20px 16px 80px;}
  header.topbar{background:var(--steel);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.18);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{height:32px;width:32px;object-fit:cover;border-radius:6px;}
  .brand-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;text-transform:uppercase;letter-spacing:.02em;}
  .role-chip{font-size:11px;background:var(--amber);color:#1a1006;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .topbar-right button{background:rgba(255,255,255,.1);color:#fff;font-size:12.5px;padding:7px 12px;}
  .topbar-right button:hover{background:rgba(255,255,255,.18);}

  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:600px){.grid-2{grid-template-columns:1fr;}}

  .auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 0 20px;}
  .auth-hero{width:100%;height:230px;position:relative;overflow:hidden;background:var(--steel);}
  .auth-hero img{width:100%;height:100%;object-fit:cover;object-position:center 40%;filter:saturate(1.05);}
  .auth-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(16,21,28,.15) 0%, rgba(16,21,28,.75) 100%);}
  .auth-hero-label{position:absolute;left:20px;bottom:14px;color:#fff;z-index:2;}
  .auth-hero-label .display{font-size:26px;margin:0;line-height:1;}
  .auth-hero-label .sub{font-size:12px;letter-spacing:.06em;opacity:.85;text-transform:uppercase;}
  .auth-card{max-width:400px;width:100%;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:32px;margin-top:-40px;position:relative;z-index:3;box-shadow:0 12px 32px rgba(16,21,28,.18);}
  .auth-card h1{font-size:30px;margin:0 0 4px;}
  .auth-sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
  .toggle-row{display:flex;gap:8px;margin-bottom:18px;}
  .toggle-row button{flex:1;background:var(--paper);color:var(--muted);border:1.5px solid var(--line);}
  .toggle-row button.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .role-select{display:flex;gap:8px;}
  .role-select button{flex:1;background:var(--paper);border:1.5px solid var(--line);color:var(--muted);}
  .role-select button.active{background:var(--amber);border-color:var(--amber);color:#1a1006;}
  .error-msg{background:#fbe9e7;color:var(--red);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;}
  .info-msg{background:#e9f3ee;color:var(--green);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;}

  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--line);}
  .tabs button{background:none;border:none;border-radius:0;padding:10px 4px;margin-right:18px;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.03em;border-bottom:2.5px solid transparent;}
  .tabs button.active{color:var(--ink);border-bottom-color:var(--amber);}

  .badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:4px 9px;border-radius:20px;}
  .badge-pool{background:#e3ecf5;color:var(--blue);}
  .badge-pending{background:#f4ecd8;color:var(--amber-dark);}
  .badge-accepted{background:#e3ecf5;color:var(--blue);}
  .badge-picked_up{background:#fbeee0;color:var(--amber-dark);}
  .badge-delivered{background:#e2efe8;color:var(--green);}
  .badge-declined,.badge-cancelled{background:#f7e3e0;color:var(--red);}
  .badge-paid{background:#e2efe8;color:var(--green);}
  .badge-unpaid{background:#f7e3e0;color:var(--red);}

  .order-card{border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:var(--paper-2);}
  .order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  .order-route{font-size:15px;font-weight:600;}
  .order-route .arrow{color:var(--muted);margin:0 6px;}
  .order-meta{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .order-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

  /* Route strip signature element */
  .route-strip{display:flex;align-items:center;margin:14px 0 6px;}
  .rs-node{width:9px;height:9px;border-radius:50%;background:var(--line);flex-shrink:0;position:relative;}
  .rs-node.done{background:var(--amber);}
  .rs-line{flex:1;height:2px;background:var(--line);}
  .rs-line.done{background:var(--amber);}
  .rs-labels{display:flex;justify-content:space-between;font-size:9.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-top:5px;}

  .log-entry{font-size:12.5px;padding:7px 0;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;gap:8px;}
  .log-entry:last-child{border-bottom:none;}
  .log-type{font-weight:700;text-transform:uppercase;font-size:10.5px;letter-spacing:.03em;}
  .log-type.delay{color:var(--red);}
  .log-type.ontime{color:var(--green);}
  .log-type.note{color:var(--blue);}

  .preset-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .preset-btns button{background:var(--paper);border:1.5px solid var(--line);color:var(--ink);font-size:12px;padding:6px 10px;}
  .preset-btns button:hover{border-color:var(--amber);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty-state .display{font-size:22px;color:var(--ink);margin-bottom:6px;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  @media(max-width:700px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .stat-card .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;margin-bottom:6px;}
  .stat-card .stat-value{font-family:'Barlow Condensed';font-size:28px;font-weight:700;}
  .stat-card.revenue .stat-value{color:var(--green);}
  .stat-card.expenses .stat-value{color:var(--red);}
  .stat-card.payouts .stat-value{color:var(--amber-dark);}
  .stat-card.net .stat-value{color:var(--ink);}

  .range-picker{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .range-picker button{background:var(--paper);border:1.5px solid var(--line);color:var(--muted);font-size:12.5px;padding:7px 12px;}
  .range-picker button.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .range-picker input[type=date]{width:auto;padding:7px 10px;font-size:12.5px;}

  .badge-approved{background:#e2efe8;color:var(--green);}
  .badge-rejected{background:#f7e3e0;color:var(--red);}

  .exp-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);gap:10px;}
  .exp-row:last-child{border-bottom:none;}
  .exp-info{font-size:13px;}
  .exp-cat{font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.03em;color:var(--muted);}
  .exp-amt{font-family:'JetBrains Mono';font-weight:600;}

  .user-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);}
  .user-row:last-child{border-bottom:none;}
  .user-info{font-size:13.5px;}
  .user-info .u-name{font-weight:600;}
  .user-info .u-role{color:var(--muted);font-size:11.5px;text-transform:uppercase;}
  .trust-tag{background:var(--amber);color:#1a1006;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;text-transform:uppercase;margin-left:6px;}

  .modal-bg{position:fixed;inset:0;background:rgba(16,21,28,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal{background:var(--paper-2);border-radius:14px;padding:24px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;}
  .modal h3{margin-top:0;}
  .close-x{float:right;background:none;color:var(--muted);font-size:18px;padding:2px 6px;}

  .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'Barlow Condensed';font-size:18px;text-transform:uppercase;letter-spacing:.05em;}
</style>
</head>

function ntfy(msg, title){
  if(!NTFY_TOPIC || NTFY_TOPIC.includes("REPLACE-ME")) return;
  fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
    method:'POST',
    headers:{ 'Title': title || 'Dispatch', 'Priority':'default' },
    body: msg
  }).catch(()=>{});
}

function fmtTime(ts){
  if(!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function esc(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getLocation(){
  return new Promise(resolve => {
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: Math.round(pos.coords.accuracy)}),
      () => resolve(null),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
    );
  });
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function mapLink(loc){

/* ============ SETTINGS (app name / logo) ============ */
async function loadSettings(){
  try{
    const doc = await db.collection('settings').doc('app').get();
    if(doc.exists) settings = {
      appName: doc.data().appName || DEFAULT_APP_NAME,
      logoUrl: doc.data().logoUrl || DEFAULT_LOGO,
      heroUrl: doc.data().heroUrl || DEFAULT_TRUCK_HERO,
      inviteCode: doc.data().inviteCode || ""
    };
    const favicon = document.querySelector('link[rel="icon"]') || document.createElement('link');
    favicon.rel = 'icon'; favicon.href = settings.logoUrl;
    document.head.appendChild(favicon);
    document.title = settings.appName;
  }catch(e){ console.warn('settings load failed', e); }
}

/* ============ AUTH STATE ============ */
auth.onAuthStateChanged(async (user) => {
  currentUser = user;
  await loadSettings();
  if(!user){ profile = null; renderAuth(); return; }
  if(!user.emailVerified){
    renderVerifyEmail();
    return;
  }
  const doc = await db.collection('users').doc(user.uid).get();
  if(!doc.exists){
    renderAuth("Account not found. Please sign up again.");
    await auth.signOut();
    return;
  }
  profile = { id: user.uid, ...doc.data() };
  if(!profile.approved){
    renderPendingApproval();
    return;
  }
  renderDashboard();
});

              <label>I am a</label>
              <div class="role-select">
                <button type="button" data-role="agent" class="active">Agent</button>
                <button type="button" data-role="driver">Driver</button>
              </div>
            </div>
            <div class="field">
              <label>Full Name</label>
              <input type="text" id="f-name" placeholder="Jane Moyo">
            </div>
            <div class="field">
              <label>Phone</label>
              <input type="tel" id="f-phone" placeholder="+263...">
            </div>
            <div class="field">
              <label>Invite Code</label>
              <input type="text" id="f-invite" placeholder="Provided by admin">
            </div>
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="f-email" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="f-password" required minlength="6">
          </div>
          <button type="submit" class="btn-primary" style="width:100%;" id="submit-btn">Log In</button>
        </form>
      </div>
    </div>
  `;

  const tabLogin = document.getElementById('tab-login');
  const tabSignup = document.getElementById('tab-signup');
  const signupExtra = document.getElementById('signup-extra');
  const submitBtn = document.getElementById('submit-btn');

  tabLogin.onclick = () => { mode='login'; tabLogin.classList.add('active'); tabSignup.classList.remove('active'); signupExtra.style.display='none'; submitBtn.textContent='Log In'; };
  tabSignup.onclick = () => { mode='signup'; tabSignup.classList.add('active'); tabLogin.classList.remove('active'); signupExtra.style.display='block'; submitBtn.textContent='Create Account'; };

  document.querySelectorAll('.role-select button').forEach(b=>{
    b.onclick = () => {
      document.querySelectorAll('.role-select button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      selectedRole = b.dataset.role;
    };
  });

  document.getElementById('auth-form').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('f-email').value.trim();
    const password = document.getElementById('f-password').value;
    const errDiv = document.getElementById('auth-error');
    errDiv.innerHTML = '';
    submitBtn.disabled = true;
    try{
      if(mode === 'login'){
        await auth.signInWithEmailAndPassword(email, password);
      } else {
        const name = document.getElementById('f-name').value.trim();
        const phone = document.getElementById('f-phone').value.trim();
        const invite = document.getElementById('f-invite').value.trim();
        if(!name){ throw new Error('Please enter your name.'); }
        if(settings.inviteCode && invite !== settings.inviteCode){
          throw new Error('Invalid invite code. Ask your admin for the current code.');
        }
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await db.collection('users').doc(cred.user.uid).set({
          name, phone, role: selectedRole,
          approved: false, trusted: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await cred.user.sendEmailVerification();
        ntfy(`New ${selectedRole} signup: ${name} (${email})`, 'New Account Pending Approval');
      }
    }catch(err){
      errDiv.innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
      submitBtn.disabled = false;
    }
  };
}

function attachDriverHandlers(){
  document.querySelectorAll('[data-action="accept"]').forEach(b=>{
    b.onclick = async () => {
      const id = b.dataset.id;
      const orderDoc = await db.collection('orders').doc(id).get();
      const rate = orderDoc.data().rate || 0;
      const commissionRate = profile.commissionRate || 0;
      const suggestedPayout = Math.round(rate * (commissionRate/100) * 100) / 100;
      await db.collection('orders').doc(id).update({
        status:'accepted', driverId: profile.id, driverName: profile.name,
        driverPayout: suggestedPayout, driverPayoutStatus: 'unpaid',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    };
  });
  document.querySelectorAll('[data-action="decline"]').forEach(b=>{
    b.onclick = async () => {
      // Driver decline just skips it for them locally isn't persisted per-driver in this MVP;
      // simplest: leave in pool for other drivers, no state change needed.
      b.closest('.order-card').style.display = 'none';
    };
  });
  document.querySelectorAll('[data-action="picked_up"]').forEach(b=>{
    b.onclick = async () => {
      const id = b.dataset.id;
      b.disabled = true; b.textContent = 'Getting location…';
      const loc = await getLocation();
      await db.collection('orders').doc(id).update({
        status:'picked_up', pickedUpAt: firebase.firestore.FieldValue.serverTimestamp(),
        pickupLocation: loc,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        statusLog: firebase.firestore.FieldValue.arrayUnion({type:'pickup', note: loc ? 'Picked up (location captured)' : 'Picked up (no location)', by:profile.name, timestamp: new Date().toISOString()})
      });
      ntfy(`${profile.name} picked up order`, 'Order Picked Up');
    };
  });
  document.querySelectorAll('[data-action="delivered"]').forEach(b=>{
    b.onclick = () => openDeliveryModal(b.dataset.id);
  });
  document.querySelectorAll('[data-action="post-update"]').forEach(b=>{
    b.onclick = () => openUpdateModal(b.dataset.id);
  });
}

function openUpdateModal(orderId){
  const modalBg = document.createElement('div');
  modalBg.className = 'modal-bg';
  modalBg.innerHTML = `
    <div class="modal">
      <button class="close-x">&times;</button>
      <h3>Post Update</h3>
      <div class="preset-btns">
        <button data-preset="ontime">On Time</button>
        <button data-preset="delay">Delayed</button>
        <button data-preset="breakdown">Breakdown</button>
        <button data-preset="arrived">Arrived</button>
      </div>
      <div class="field"><label>Note (optional)</label><textarea id="update-note" rows="2" placeholder="e.g. flat tire, back on road in 30 min"></textarea></div>
      <button class="btn-primary" id="send-update" style="width:100%;">Send Update</button>
    </div>
  `;
  document.body.appendChild(modalBg);
  let selectedType = 'ontime';
  modalBg.querySelectorAll('[data-preset]').forEach(btn=>{
    btn.onclick = () => {
      modalBg.querySelectorAll('[data-preset]').forEach(x=>x.style.background='var(--paper)');
      btn.style.background = 'var(--amber)';
      selectedType = btn.dataset.preset;
    };
  });
  modalBg.querySelector('.close-x').onclick = () => modalBg.remove();
  modalBg.onclick = (e) => { if(e.target === modalBg) modalBg.remove(); };
  modalBg.querySelector('#send-update').onclick = async () => {
    const note = document.getElementById('update-note').value.trim();
    await db.collection('orders').doc(orderId).update({
      statusLog: firebase.firestore.FieldValue.arrayUnion({
        type: selectedType, note: note || presetLabel(selectedType),
        by: profile.name, timestamp: new Date().toISOString()
      }),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    if(selectedType === 'delay' || selectedType === 'breakdown'){
      ntfy(`${profile.name}: ${presetLabel(selectedType)}${note ? ' — ' + note : ''}`, '⚠️ Driver Update: Attention Needed');
    }
    modalBg.remove();
  };
}
function presetLabel(type){
  return { ontime:'On Time', delay:'Delayed', breakdown:'Breakdown', arrived:'Arrived' }[type] || type;
}

function openDeliveryModal(orderId){
  const modalBg = document.createElement('div');
  modalBg.className = 'modal-bg';
  modalBg.innerHTML = `
    <div class="modal">
      <button class="close-x">&times;</button>
      <h3>Confirm Delivery</h3>

        <label>Delivery Photo</label>
        <input type="file" accept="image/*" capture="environment" id="pod-photo-input">
      </div>
      <div id="pod-preview" style="margin-bottom:10px;"></div>
      <div id="pod-status" style="font-size:12px;color:var(--muted);margin-bottom:10px;">📍 Capturing location…</div>
      <div id="pod-err"></div>
      <button class="btn-primary" id="confirm-delivery-btn" style="width:100%;" disabled>Confirm Delivery</button>
    </div>
  `;

  modalBg.onclick = (e) => { if(e.target === modalBg) modalBg.remove(); };

  let photoDataUrl = null;
  let location = null;
  const confirmBtn = document.getElementById('confirm-delivery-btn');

  getLocation().then(loc => {
    location = loc;
    const statusEl = document.getElementById('pod-status');
    if(statusEl) statusEl.textContent = loc ? `📍 Location captured (±${loc.accuracy}m)` : '📍 Location unavailable — continuing without it';
  });

    const file = e.target.files[0];
    if(!file) return;
    const errDiv = document.getElementById('pod-err');
    errDiv.innerHTML = '';
    try{
      photoDataUrl = await compressImage(file, 800, 0.6);
      document.getElementById('pod-preview').innerHTML = `<img src="${photoDataUrl}" style="width:100%;border-radius:8px;max-height:220px;object-fit:cover;">`;
      confirmBtn.disabled = false;
    }catch(err){
      errDiv.innerHTML = `<div class="error-msg">Couldn't process that photo. Try again.</div>`;
    }

  confirmBtn.onclick = async () => {
    confirmBtn.disabled = true; confirmBtn.textContent = 'Saving…';
    try{
      await db.collection('orders').doc(orderId).update({
        status:'delivered', deliveredAt: firebase.firestore.FieldValue.serverTimestamp(),
        deliveryLocation: location, podPhoto: photoDataUrl,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        statusLog: firebase.firestore.FieldValue.arrayUnion({type:'delivery', note: 'Delivered — POD attached', by:profile.name, timestamp: new Date().toISOString()})
      });
      ntfy(`${profile.name} delivered order — POD attached`, 'Order Delivered');
      modalBg.remove();
    }catch(err){
      document.getElementById('pod-err').innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
      confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm Delivery';
    }
  };
}

function computeRangeBounds(){
  const now = new Date();
  let start, end;
  if(finRangeType === 'week'){
    start = new Date(now); start.setDate(now.getDate() - now.getDay()); start.setHours(0,0,0,0);
    end = new Date(); end.setHours(23,59,59,999);
  } else if(finRangeType === 'month'){
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end = new Date(); end.setHours(23,59,59,999);
  } else if(finRangeType === 'custom' && finCustomStart && finCustomEnd){
    start = new Date(finCustomStart); start.setHours(0,0,0,0);
    end = new Date(finCustomEnd); end.setHours(23,59,59,999);
  } else {
    start = null; end = null; // all time
  }
  return {start, end};
}

function inRange(date, start, end){
  if(!date) return false;
  if(!start && !end) return true;
  const d = date.toDate ? date.toDate() : new Date(date);
  return d >= start && d <= end;
}

function renderFinancialsTab(content){
  content.innerHTML = `
    <div class="range-picker">
      <button data-range="week" class="${finRangeType==='week'?'active':''}">This Week</button>
      <button data-range="month" class="${finRangeType==='month'?'active':''}">This Month</button>
      <button data-range="all" class="${finRangeType==='all'?'active':''}">All Time</button>
      <button data-range="custom" class="${finRangeType==='custom'?'active':''}">Custom</button>
      ${finRangeType==='custom' ? `
        <input type="date" id="fin-start" value="${finCustomStart||''}">
        <input type="date" id="fin-end" value="${finCustomEnd||''}">
      ` : ''}
    </div>
    <div id="fin-summary"><div class="empty-state">Loading…</div></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;">Pending Expense Approvals</h3>
      </div>
      <div id="fin-pending-expenses" style="margin-top:10px;">Loading…</div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;">Export</h3>
        <button class="btn-ghost btn-sm" id="export-csv-btn">Download CSV</button>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:0;">Exports orders and approved expenses for the selected range.</p>
    </div>
  `;

  document.querySelectorAll('[data-range]').forEach(b=>{
    b.onclick = () => { finRangeType = b.dataset.range; renderFinancialsTab(content); };
  });
  if(finRangeType === 'custom'){
    const startInp = document.getElementById('fin-start');
    const endInp = document.getElementById('fin-end');
    startInp.onchange = () => { finCustomStart = startInp.value; renderFinancialsTab(content); };
    endInp.onchange = () => { finCustomEnd = endInp.value; renderFinancialsTab(content); };
  }

  const {start, end} = computeRangeBounds();
  let allOrders = [], allExpenses = [];
  let ordersLoaded = false, expensesLoaded = false;

  function tryRenderSummary(){
    if(!ordersLoaded || !expensesLoaded) return;
    const ordersInRange = allOrders.filter(o => inRange(o.createdAt, start, end));
    const expensesInRange = allExpenses.filter(e => inRange(e.submittedAt, start, end));

    const revenue = ordersInRange.filter(o => o.paymentStatus === 'paid').reduce((s,o) => s + (o.rate||0), 0);
    const expenseTotal = expensesInRange.filter(e => e.status === 'approved').reduce((s,e) => s + (e.amount||0), 0);
    const payoutTotal = ordersInRange.filter(o => o.driverPayoutStatus === 'paid').reduce((s,o) => s + (o.driverPayout||0), 0);
    const net = revenue - expenseTotal - payoutTotal;

    const summaryEl = document.getElementById('fin-summary');
    if(summaryEl){
      summaryEl.innerHTML = `
        <div class="stat-grid">
          <div class="stat-card revenue"><div class="stat-label">Revenue Collected</div><div class="stat-value">$${revenue.toFixed(2)}</div></div>
          <div class="stat-card expenses"><div class="stat-label">Approved Expenses</div><div class="stat-value">$${expenseTotal.toFixed(2)}</div></div>
          <div class="stat-card payouts"><div class="stat-label">Driver Payouts Paid</div><div class="stat-value">$${payoutTotal.toFixed(2)}</div></div>
          <div class="stat-card net"><div class="stat-label">Net</div><div class="stat-value">$${net.toFixed(2)}</div></div>
        </div>
      `;
    }

    const pendingEl = document.getElementById('fin-pending-expenses');
    if(pendingEl){
      const pending = allExpenses.filter(e => e.status === 'pending');
      pendingEl.innerHTML = pending.length ? pending.map(e => `
        <div class="exp-row">
          <div class="exp-info"><span class="exp-cat">${esc(e.category)}</span> · ${esc(e.driverName)}<br>${esc(e.note||'')}<br><span style="color:var(--muted);font-size:11.5px;">${fmtTime(e.submittedAt)}</span></div>
          <div style="text-align:right;">
            <div class="exp-amt">$${e.amount.toFixed(2)}</div>
            <div style="margin-top:6px;display:flex;gap:6px;">
              <button class="btn-green btn-sm" data-exp-approve="${e.id}">Approve</button>
              <button class="btn-danger btn-sm" data-exp-reject="${e.id}">Reject</button>
            </div>
          </div>
        </div>
      `).join('') : `<div style="color:var(--muted);font-size:13px;">Nothing pending.</div>`;

      document.querySelectorAll('[data-exp-approve]').forEach(b=>{
        b.onclick = async () => { await db.collection('expenses').doc(b.dataset.expApprove).update({status:'approved', reviewedAt: firebase.firestore.FieldValue.serverTimestamp()}); };
      });
      document.querySelectorAll('[data-exp-reject]').forEach(b=>{
        b.onclick = async () => { await db.collection('expenses').doc(b.dataset.expReject).update({status:'rejected', reviewedAt: firebase.firestore.FieldValue.serverTimestamp()}); };
      });
    }

    const exportBtn = document.getElementById('export-csv-btn');
    if(exportBtn){
      exportBtn.onclick = () => exportFinancialsCSV(ordersInRange, expensesInRange.filter(e => e.status === 'approved'));
    }
  }

  if(unsubOrders) unsubOrders();
  if(unsubUsers) unsubUsers();
  unsubOrders = db.collection('orders').onSnapshot(snap => {
    allOrders = snap.docs.map(d => ({id:d.id, ...d.data()}));
    ordersLoaded = true;
    tryRenderSummary();
  });
  unsubUsers = db.collection('expenses').onSnapshot(snap => {
    allExpenses = snap.docs.map(d => ({id:d.id, ...d.data()}));
    expensesLoaded = true;
    tryRenderSummary();
  });
}

function csvEscape(val){
  const s = String(val ?? '');
  return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
}

function exportFinancialsCSV(orders, expenses){
  const lines = [];
  lines.push('Type,Date,Agent/Driver,Description,Amount,Status');
  orders.forEach(o => {
    lines.push([
      'Order Revenue', fmtTime(o.createdAt), csvEscape(o.agentName),
      csvEscape(`${o.pickupAddress} -> ${o.deliveryAddress}`), (o.rate||0).toFixed(2), o.paymentStatus
    ].join(','));
    if(o.driverPayout){
      lines.push([
        'Driver Payout', fmtTime(o.createdAt), csvEscape(o.driverName||''),
        csvEscape(`${o.pickupAddress} -> ${o.deliveryAddress}`), (o.driverPayout||0).toFixed(2), o.driverPayoutStatus||'unpaid'
      ].join(','));
    }
  });
  expenses.forEach(e => {
    lines.push([
      'Expense', fmtTime(e.submittedAt), csvEscape(e.driverName),
      csvEscape(`${e.category}${e.note ? ' - ' + e.note : ''}`), (e.amount||0).toFixed(2), e.status
    ].join(','));
  });
  const csv = lines.join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `financials-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function renderUserRow(u){
  return `
    <div class="user-row">
      <div class="user-info">
        <div class="u-name">${esc(u.name)} ${u.trusted ? '<span class="trust-tag">Trusted</span>' : ''}</div>
        <div class="u-role">${esc(u.role)} · ${esc(u.phone||'no phone')}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        ${u.approved && u.role==='driver' ? `
          <input type="number" min="0" max="100" step="1" value="${u.commissionRate||0}" data-commission="${u.id}" style="width:64px;padding:6px 8px;font-size:12.5px;" title="Commission %">
          <span style="font-size:11.5px;color:var(--muted);">%</span>
        ` : ''}
        ${!u.approved ? `<button class="btn-green btn-sm" data-approve="${u.id}">Approve</button>` : ''}
        ${u.approved && u.role==='agent' ? `<button class="btn-ghost btn-sm" data-trust="${u.id}" data-trusted="${u.trusted?1:0}">${u.trusted?'Untrust':'Trust'}</button>` : ''}
      </div>
    </div>
  `;
}

function attachUserHandlers(){
  document.querySelectorAll('[data-approve]').forEach(b=>{
    b.onclick = async () => { await db.collection('users').doc(b.dataset.approve).update({approved:true}); };
  });
  document.querySelectorAll('[data-trust]').forEach(b=>{
    b.onclick = async () => {
      const isTrusted = b.dataset.trusted === '1';
      await db.collection('users').doc(b.dataset.trust).update({trusted: !isTrusted});
    };
  });
  document.querySelectorAll('[data-commission]').forEach(inp=>{
    inp.onchange = async () => {
      const val = Math.max(0, Math.min(100, parseFloat(inp.value) || 0));
      await db.collection('users').doc(inp.dataset.commission).update({commissionRate: val});
    };
  });
}

function attachAdminOrderHandlers(){
  document.querySelectorAll('[data-action="approve-pool"]').forEach(b=>{
    b.onclick = async () => { await db.collection('orders').doc(b.dataset.id).update({status:'pool', updatedAt: firebase.firestore.FieldValue.serverTimestamp()}); };
  });
  document.querySelectorAll('[data-action="admin-decline"]').forEach(b=>{
    b.onclick = async () => { await db.collection('orders').doc(b.dataset.id).update({status:'declined', updatedAt: firebase.firestore.FieldValue.serverTimestamp()}); };
  });
  document.querySelectorAll('[data-action="cancel"]').forEach(b=>{
    b.onclick = async () => {
      if(!confirm('Cancel this order?')) return;
      await db.collection('orders').doc(b.dataset.id).update({status:'cancelled', updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
    };
  });
  document.querySelectorAll('[data-action="toggle-payment"]').forEach(b=>{
    b.onclick = async () => {
      const current = b.dataset.paid === '1';
      await db.collection('orders').doc(b.dataset.id).update({paymentStatus: current ? 'unpaid' : 'paid'});
    };
  });
  document.querySelectorAll('[data-payout-amount]').forEach(inp=>{
    inp.onchange = async () => {
      const val = Math.max(0, parseFloat(inp.value) || 0);
      await db.collection('orders').doc(inp.dataset.payoutAmount).update({driverPayout: val});
    };
  });
  document.querySelectorAll('[data-action="toggle-payout"]').forEach(b=>{
    b.onclick = async () => {
      const current = b.dataset.paid === '1';
      await db.collection('orders').doc(b.dataset.id).update({driverPayoutStatus: current ? 'unpaid' : 'paid'});
    };
  });
}

/* ============================================================
   SHARED: ORDER CARD RENDERER
   ============================================================ */
const STAGES = ['pool','accepted','picked_up','delivered'];
function renderOrderCard(o, viewer){
  const stageIdx = STAGES.indexOf(o.status);
  const showStrip = !['pending_admin','declined','cancelled'].includes(o.status);
  const log = (o.statusLog || []).slice().sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));

  let actions = '';
  if(viewer === 'driver'){
    if(o.status === 'pool'){
      actions = `<button class="btn-primary btn-sm" data-action="accept" data-id="${o.id}">Accept</button>
                 <button class="btn-ghost btn-sm" data-action="decline" data-id="${o.id}">Decline</button>`;
    } else if(o.status === 'accepted' && o.driverId === profile.id){
      actions = `<button class="btn-primary btn-sm" data-action="picked_up" data-id="${o.id}">Mark Picked Up</button>
                 <button class="btn-ghost btn-sm" data-action="post-update" data-id="${o.id}">Post Update</button>`;
    } else if(o.status === 'picked_up' && o.driverId === profile.id){
      actions = `<button class="btn-primary btn-sm" data-action="delivered" data-id="${o.id}">Mark Delivered</button>
                 <button class="btn-ghost btn-sm" data-action="post-update" data-id="${o.id}">Post Update</button>`;
    }
  } else if(viewer === 'admin'){
    if(o.status === 'pending_admin'){
      actions = `<button class="btn-green btn-sm" data-action="approve-pool" data-id="${o.id}">Approve → Pool</button>
                 <button class="btn-danger btn-sm" data-action="admin-decline" data-id="${o.id}">Decline</button>`;
    } else if(!['delivered','declined','cancelled'].includes(o.status)){
      actions = `<button class="btn-ghost btn-sm" data-action="cancel" data-id="${o.id}">Cancel Order</button>`;
    }
    actions += ` <button class="btn-sm ${o.paymentStatus==='paid' ? 'btn-ghost' : 'btn-green'}" data-action="toggle-payment" data-id="${o.id}" data-paid="${o.paymentStatus==='paid'?1:0}">${o.paymentStatus==='paid' ? 'Mark Unpaid' : 'Mark Paid'}</button>`;
  }

  let payoutBlock = '';
  if(viewer === 'admin' && o.driverId){
    payoutBlock = `
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);">
        <span style="font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;">Driver Payout</span>
        <input type="number" min="0" step="0.01" value="${o.driverPayout||0}" data-payout-amount="${o.id}" style="width:80px;padding:5px 8px;font-size:12.5px;">
        <span class="badge badge-${o.driverPayoutStatus==='paid' ? 'paid' : 'unpaid'}">${o.driverPayoutStatus||'unpaid'}</span>
        <button class="btn-sm ${o.driverPayoutStatus==='paid' ? 'btn-ghost' : 'btn-green'}" data-action="toggle-payout" data-id="${o.id}" data-paid="${o.driverPayoutStatus==='paid'?1:0}">${o.driverPayoutStatus==='paid' ? 'Mark Unpaid' : 'Mark Paid'}</button>
      </div>
    `;
  }

  return `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-route">${esc(o.pickupAddress)}<span class="arrow">→</span>${esc(o.deliveryAddress)}</div>
          <div class="order-meta">Agent: ${esc(o.agentName)} ${o.driverName ? '· Driver: ' + esc(o.driverName) : ''} ${o.rate ? '· $' + o.rate : ''}</div>
          <div class="order-meta">${esc(o.loadDetails || '')}</div>
        </div>
        <div style="text-align:right;">
          <span class="badge badge-${o.status}">${o.status.replace('_',' ')}</span><br>
          ${viewer !== 'driver' ? `<span class="badge badge-${o.paymentStatus}" style="margin-top:4px;">${o.paymentStatus}</span>` : ''}
        </div>
      </div>
      ${showStrip ? routeStrip(stageIdx) : ''}
      <div class="order-meta">Submitted ${fmtTime(o.createdAt)}</div>
      ${(o.pickupLocation || o.deliveryLocation) ? `
        <div class="order-meta" style="margin-top:4px;">
          ${o.pickupLocation ? `<a href="${mapLink(o.pickupLocation)}" target="_blank" rel="noopener">📍 Pickup location</a>` : ''}
          ${o.pickupLocation && o.deliveryLocation ? ' · ' : ''}
          ${o.deliveryLocation ? `<a href="${mapLink(o.deliveryLocation)}" target="_blank" rel="noopener">📍 Delivery location</a>` : ''}
        </div>
      ` : ''}
      ${o.podPhoto ? `
        <div style="margin-top:10px;">
          <div class="order-meta" style="margin-bottom:4px;">Proof of Delivery</div>
          <img src="${o.podPhoto}" style="width:100%;max-height:260px;object-fit:cover;border-radius:8px;border:1px solid var(--line);">
        </div>
      ` : ''}
      ${actions ? `<div class="order-actions">${actions}</div>` : ''}
      ${payoutBlock}
      ${log.length ? `<div style="margin-top:12px;border-top:1px solid var(--line);padding-top:8px;">
        ${log.map(l => `<div class="log-entry"><span><span class="log-type ${l.type==='delay'||l.type==='breakdown'?'delay':(l.type==='ontime'?'ontime':'note')}">${esc(presetLabel(l.type))}</span> ${esc(l.note||'')}</span><span class="mono" style="color:var(--muted);">${new Date(l.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>`).join('')}
      </div>` : ''}
    </div>
  `;
}

function routeStrip(stageIdx){
  const labels = ['Pool','Accepted','Picked Up','Delivered'];
  let nodes = '';
  for(let i=0;i<4;i++){
    nodes += `<div class="rs-node ${i<=stageIdx?'done':''}"></div>`;
    if(i<3) nodes += `<div class="rs-line ${i<stageIdx?'done':''}"></div>`;
  }
  return `<div class="route-strip">${nodes}</div><div class="rs-labels">${labels.map(l=>`<span>${l}</span>`).join('')}</div>`;
}
